server {
  # ${PORT} is substituted at container start via nginx's
  # /etc/nginx/templates/ envsubst hook — defaults to 80 locally,
  # Railway / Fly / Cloud Run will inject their own value.
  listen      ${PORT} default_server;
  server_name _;
  root        /usr/share/nginx/html;
  index       index.html;

  # Gzip on common asset types
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types
    application/javascript
    application/json
    application/xml
    text/css
    text/javascript
    text/plain
    image/svg+xml;

  # Long-cache fingerprinted assets (Vite puts a hash in the filename)
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
    try_files $uri =404;
  }

  # Static files (favicons, png screenshots, etc.) — short cache
  location ~* \.(?:ico|png|jpe?g|gif|webp|svg|woff2?|ttf|eot)$ {
    expires 7d;
    add_header Cache-Control "public";
    access_log off;
    try_files $uri =404;
  }

  # SPA fallback: every other path resolves to index.html so React Router takes over
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }

  # Lightweight liveness probe for orchestrators
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }
}
